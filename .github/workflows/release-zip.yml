ÔĽŅname: Release Zip

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore .\AutoTool.sln

      - name: Resolve version from GitHub ref
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $isTag = "${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true"

          if ($isTag) {
            $tag = "${{ github.ref_name }}"
            if ($tag -notmatch '^v(\d+)\.(\d+)\.(\d+)$') {
              throw "„āŅ„āįŚĹĘŚľŹ„ĀĆšłćś≠£„Āß„Āô„Äā'vMAJOR.MINOR.PATCH' „āíšĹŅÁĒ®„Āó„Ā¶„ĀŹ„Ā†„Āē„ĀĄ„ÄāŚŹóšŅ°ŚÄ§: $tag"
            }

            $semanticVersion = $Matches[1] + "." + $Matches[2] + "." + $Matches[3]
            "is_tag=true" >> $env:GITHUB_OUTPUT
            "zip_version=$tag" >> $env:GITHUB_OUTPUT
            "semantic_version=$semanticVersion" >> $env:GITHUB_OUTPUT
            "publish_version_args=/p:Version=$semanticVersion /p:FileVersion=$semanticVersion /p:AssemblyVersion=$semanticVersion" >> $env:GITHUB_OUTPUT
            return
          }

          $manualVersion = "manual-${{ github.run_number }}"
          "is_tag=false" >> $env:GITHUB_OUTPUT
          "zip_version=$manualVersion" >> $env:GITHUB_OUTPUT
          "publish_version_args=" >> $env:GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish .\AutoTool.Bootstrap\AutoTool.Bootstrap.csproj
          -c Release
          -r win-x64
          --self-contained false
          -o .\.deploy\AutoTool_publish
          ${{ steps.version.outputs.publish_version_args }}

      - name: Validate published version for tag release
        if: steps.version.outputs.is_tag == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $expected = "${{ steps.version.outputs.semantic_version }}"
          $exePath = Resolve-Path ".\.deploy\AutoTool_publish\AutoTool.exe"
          $version = (Get-Item -LiteralPath $exePath).VersionInfo

          if ($version.FileVersion -ne $expected) {
            throw "FileVersion šłćšłÄŤáī: expected=$expected actual=$($version.FileVersion)"
          }

          if ($version.ProductVersion -notlike "$expected*") {
            throw "ProductVersion šłćšłÄŤáī: expected-prefix=$expected actual=$($version.ProductVersion)"
          }

      - name: Prepare package files
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $publishDir = Resolve-Path ".\.deploy\AutoTool_publish"
          $packageRoot = Join-Path $pwd ".\.deploy\release_package"
          $settingsDir = Join-Path $packageRoot "Settings"

          if (Test-Path -LiteralPath $packageRoot) {
            Remove-Item -LiteralPath $packageRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $packageRoot | Out-Null
          New-Item -ItemType Directory -Path $settingsDir | Out-Null

          Copy-Item -LiteralPath (Join-Path $publishDir "AutoTool.exe") -Destination $packageRoot -Force
          Get-ChildItem -LiteralPath $publishDir -File -Filter "*.dll" | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination $packageRoot -Force
          }
          Get-ChildItem -LiteralPath $publishDir -File -Filter "*.deps.json" | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination $packageRoot -Force
          }
          Get-ChildItem -LiteralPath $publishDir -File -Filter "*.runtimeconfig.json" | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination $packageRoot -Force
          }
          Get-ChildItem -LiteralPath $pwd -File -Filter "Readme*.txt" | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination $packageRoot -Force
          }
          Get-ChildItem -LiteralPath $publishDir -File -Filter "THIRD_PARTY_NOTICES*.txt" | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination $packageRoot -Force
          }

          $publishLicensesDir = Join-Path $publishDir "licenses"
          if (Test-Path -LiteralPath $publishLicensesDir) {
            Copy-Item -LiteralPath $publishLicensesDir -Destination (Join-Path $packageRoot "licenses") -Recurse -Force
          }

          $settingsJson = Join-Path $publishDir "Settings\appsettings.json"
          if (Test-Path -LiteralPath $settingsJson) {
            Copy-Item -LiteralPath $settingsJson -Destination (Join-Path $settingsDir "appsettings.json") -Force
          }

          Get-ChildItem -LiteralPath $packageRoot -Recurse -File | Where-Object {
            $_.Extension -in ".pdb", ".lib"
          } | ForEach-Object {
            Remove-Item -LiteralPath $_.FullName -Force
          }

      - name: Create zip
        id: zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.version.outputs.zip_version }}"
          $zipName = "AutoTool-$version-win-x64.zip"
          $zipPath = Join-Path $pwd $zipName
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path ".\.deploy\release_package\*" -DestinationPath $zipPath -CompressionLevel Optimal
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.zip_name }}
          path: ${{ steps.zip.outputs.zip_path }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          overwrite_files: true
          files: ${{ steps.zip.outputs.zip_path }}
